<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Digital Library - Browse and borrow books.">
  <title>Digital Library – LMS</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar"><div class="container flex-between">
    <a href="index.html" class="nav-logo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg> LMS</a>
    <div class="nav-links"><a href="index.html">Home</a><a href="courses.html">Courses</a><a href="library.html" class="active">Library</a><a href="about.html">About</a><a href="contact.html">Contact</a></div>
    <div class="nav-actions">
      <button class="theme-toggle" aria-label="Toggle theme"><svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg><svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg></button>
      <div id="nav-auth"><a href="login.html" class="btn btn-sm btn-secondary">Log In</a><a href="login.html" class="btn btn-sm btn-primary">Sign Up</a></div>
      <button class="nav-toggle" aria-label="Toggle menu"><span></span><span></span><span></span></button>
    </div>
  </div></nav>

  <main class="page-wrapper">
    <div class="container">
      <!-- Page Header -->
      <div style="text-align:center; margin-bottom: var(--space-2xl);" class="animate-up">
        <h1 style="font-size: 3.5rem;">Digital <em class="serif-italic" style="color: var(--primary);">Library</em></h1>
        <p style="max-width:500px;margin:var(--space-sm) auto 0; font-size: 1.1rem;">Browse our collection of digital resources, e-books, and reference materials.</p>
      </div>

      <!-- Search & Filter Bar -->
      <div class="card animate-up animate-up-1" style="padding: var(--space-md); margin-bottom: var(--space-xl); display:flex; gap: var(--space-md); flex-wrap: wrap; align-items:center;">
        <div style="flex:1; min-width:200px;">
          <input type="text" class="form-input" id="book-search" placeholder="Search by title, author, or ISBN..." style="padding:10px 16px;">
        </div>
        <select class="form-select" id="book-category" style="width:160px;padding:10px 12px;">
          <option value="all">All Categories</option>
          <option value="Computer Science">Computer Science</option>
          <option value="Software Engineering">Software Engineering</option>
          <option value="Science">Science</option>
          <option value="Mathematics">Mathematics</option>
          <option value="Literature">Literature</option>
        </select>
        <select class="form-select" id="book-sort" style="width:150px;padding:10px 12px;">
          <option value="newest">Newest Additions</option>
          <option value="rating-high">Highest Rated</option>
          <option value="price-low">Price: Low–High</option>
          <option value="price-high">Price: High–Low</option>
        </select>
      </div>

      <!-- Book Grid -->
      <div class="grid-3" id="books-grid" style="margin-bottom:var(--space-xl);">
        <div style="grid-column:1/-1;text-align:center;padding:var(--space-3xl);color:var(--text-muted);">
          Loading library catalog...
        </div>
      </div>

    </div>
  </main>

  <footer class="footer"><div class="container">
    <div class="footer-bottom" style="padding-top:0;border-top:none;">
      <span>&copy; 2026 LMS. All rights reserved.</span>
      <div><a href="contact.html" style="color:var(--text-on-footer);">Contact</a> &middot; <a href="about.html" style="color:var(--text-on-footer);">About</a> &middot; <a href="privacy.html" style="color:var(--text-on-footer);">Privacy</a></div>
    </div>
  </div></footer>

  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/app.js"></script>
  <script src="js/library.js"></script>
</body>
</html>
