<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parent Dashboard – LMS</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

  <nav class="navbar"><div class="container flex-between">
    <a href="index.html" class="nav-logo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg> LMS</a>
    <div class="nav-actions">
      <button class="theme-toggle" aria-label="Toggle theme"><svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg><svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg></button>
      <button id="sidebar-toggle" class="btn btn-icon btn-secondary" style="display:none;">☰</button>
      <button onclick="logout()" class="btn btn-sm btn-outline" style="border-color:#ef4444;color:#ef4444;">Logout</button>
    </div>
  </div></nav>
  <!-- Secondary Course Navbar -->
  <div class="course-navbar animate-up">
    <div class="container">
      <nav class="course-nav-links">
        <a href="#" class="active" data-section="overview">Overview</a>
        <a href="#" data-section="students">My Students</a>
        <a href="#" data-section="billing">Billing</a>
        <a href="messages.html" data-section="messages">Messages</a>
        <a href="calendar.html" data-section="calendar">Calendar</a>
      </nav>
    </div>
  </div>
  <div class="dashboard-layout-algoma">
    

    <main class="dashboard-main">
      <div class="dash-header animate-up">
        <div><h1>Parent Dashboard</h1><p class="dash-date" id="parent-date"></p></div>
      </div>

      <!-- Student List -->
      <div class="dash-section animate-up animate-up-1" id="section-students">
        <div class="dash-section-header">
          <h3>My Students</h3>
          <button class="btn btn-sm btn-outline" onclick="showToast('Password reset link sent to student email.','success')">Reset Student Password</button>
        </div>
        <div class="grid-2" id="student-cards" style="align-items:start;">
          <!-- Populated by JS -->
        </div>
      </div>

      <!-- Billing History -->
      <div class="dash-section animate-up animate-up-2" id="section-billing">
        <div class="dash-section-header">
          <h3>Billing History</h3>
          <button class="btn btn-sm btn-secondary">View Invoices</button>
        </div>
        <div class="table-wrapper">
          <table>
            <thead><tr><th>Student</th><th>Course</th><th>Amount</th><th>Date</th><th>Status</th></tr></thead>
            <tbody id="billing-table"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script src="js/app.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/parent.js"></script>
</body>
</html>
