<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seed Firebase Database</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { padding: 40px; text-align: center; font-family: 'Lexend', sans-serif; }
    .log-container { text-align: left; max-width: 600px; margin: 20px auto; background: var(--bg-card); padding: 20px; border-radius: 8px; border: 1px solid var(--border); height: 400px; overflow-y: auto; font-family: monospace; font-size: 14px;}
    .log-entry { margin-bottom: 5px; }
    .success { color: #10b981; }
    .error { color: #ef4444; }
    .info { color: #3b82f6; }
  </style>

  <!-- Firebase Compat Framework -->
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore-compat.js"></script>
</head>
<body>
  <h1>Firebase Data Seeder</h1>
  <p>Click the button below to upload DEMO_USERS, LMS_COURSES, LMS_GRADES, LMS_EVENTS_MAP, and LMS_MESSAGES into your Firestore database.</p>
  
  <button id="seed-btn" class="btn btn-primary" style="margin-top:20px;">Start Seeding Database</button>

  <div class="log-container" id="log-output">
    <div class="log-entry info">Waiting to start...</div>
  </div>

  <script src="js/demo-data.js"></script>
  <script src="js/auth.js"></script> <!-- To get DEMO_USERS -->
  <script src="js/firebase-config.js"></script>
  <script src="js/seed-firebase.js"></script>
</body>
</html>
