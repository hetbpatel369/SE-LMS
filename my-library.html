<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Library – LMS</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar"><div class="container flex-between">
    <a href="index.html" class="nav-logo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg> LMS</a>
    <div class="nav-actions">
      <button class="theme-toggle" aria-label="Toggle theme"><svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg><svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg></button>
      <button onclick="auth.signOut().then(()=>window.location.href='login.html')" class="btn btn-sm btn-outline" style="border-color:#ef4444;color:#ef4444;">Logout</button>
    </div>
  </div></nav>

  <!-- Secondary Course Navbar -->
  <div class="course-navbar animate-up">
    <div class="container">
      <nav class="course-nav-links">
        <a href="student-dash.html" data-section="overview">Overview</a>
        <a href="student-dash.html" data-section="courses">My Courses</a>
        <a href="calendar.html" data-section="calendar">Calendar</a>
        <a href="my-library.html" class="active" data-section="library">Library</a>
        <a href="messages.html" data-section="messages">Messages</a>
        <a href="student-dash.html" data-section="grades">Grades</a>
        <a href="profile.html" data-section="profile">Profile</a>
      </nav>
    </div>
  </div>

  <div class="dashboard-layout-algoma">
    <!-- Main Content -->
    <main class="dashboard-main">
      <div class="dash-header animate-up">
        <div style="display:flex; justify-content:space-between; align-items:flex-end; width:100%;">
          <div>
            <h1>My <em class="serif-italic" style="color:var(--primary);">Library</em></h1>
            <p style="color:var(--text-secondary);">Manage your borrowed and purchased books.</p>
          </div>
          <a href="library.html" class="btn btn-sm btn-primary">Browse Catalog</a>
        </div>
      </div>

      <section class="dash-section animate-up">
        <div class="dash-section-header"><h2>Currently Borrowed</h2></div>
        <div class="grid-3" id="borrowed-books-grid">
          <div style="grid-column:1/-1; padding:var(--space-xl); background:var(--bg-card); border:1px solid var(--border-subtle); border-radius:var(--radius-md); text-align:center;">
            Loading active borrows...
          </div>
        </div>
      </section>

      <section class="dash-section animate-up animate-up-1">
        <div class="dash-section-header"><h2>My Collection (Purchased)</h2></div>
        <div class="grid-3" id="purchased-books-grid">
             <div style="grid-column:1/-1; padding:var(--space-xl); background:var(--bg-card); border:1px solid var(--border-subtle); border-radius:var(--radius-md); text-align:center;">
              Loading purchased books...
             </div>
        </div>
      </section>
    </main>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/app.js"></script>
  <script src="js/my-library.js"></script>
</body>
</html>
