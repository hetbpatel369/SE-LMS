<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendar – LMS</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body>
  <div id="app-header"></div>

  <main class="page-wrapper has-course-nav">
    <div class="container">
      <div class="grid-2" style="align-items:start;gap:var(--space-xl);">
        <div class="calendar-mini animate-up animate-up-1">
          <div class="calendar-header">
            <button id="prev-month" class="btn btn-sm btn-secondary" type="button">←</button>
            <h3 id="calendar-month-year" style="margin:0;font-size:1rem;">Month Year</h3>
            <button id="next-month" class="btn btn-sm btn-secondary" type="button">→</button>
          </div>
          <div class="calendar-grid" id="calendar-grid"></div>
        </div>

        <div class="animate-up animate-up-2">
          <div class="card" style="padding:var(--space-xl);margin-bottom:var(--space-md);">
            <h3 style="margin-bottom:var(--space-md);">Upcoming Events</h3>
            <div class="event-list" id="events-list">
              <!-- Populated by JS -->
            </div>
          </div>
          <div class="card" style="padding:var(--space-xl);">
            <h3 id="legend-title" style="margin-bottom:var(--space-md);">Legend</h3>
            <div id="legend-container" style="display:flex;flex-direction:column;gap:var(--space-sm);">
              <div style="display:flex;align-items:center;gap:var(--space-sm);font-size:0.85rem;">
                <span style="width:12px;height:12px;border-radius:3px;background:#4f46e5;"></span> Assignment Due
              </div>
              <div style="display:flex;align-items:center;gap:var(--space-sm);font-size:0.85rem;">
                <span style="width:12px;height:12px;border-radius:3px;background:#d97706;"></span> Quiz
              </div>
              <div style="display:flex;align-items:center;gap:var(--space-sm);font-size:0.85rem;">
                <span style="width:12px;height:12px;border-radius:3px;background:#dc2626;"></span> Exam
              </div>
              <div style="display:flex;align-items:center;gap:var(--space-sm);font-size:0.85rem;">
                <span style="width:12px;height:12px;border-radius:3px;background:#0891b2;"></span> Live Class
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer"><div class="container">
    <div class="footer-bottom" style="padding-top:0;border-top:none;">
      <span>&copy; 2026 LMS. All rights reserved.</span>
      <div><a href="/pages/public/contact.html" style="color:var(--text-on-footer);">Contact</a> &middot; <a href="/pages/public/about.html" style="color:var(--text-on-footer);">About</a> &middot; <a href="/pages/public/privacy.html" style="color:var(--text-on-footer);">Privacy</a></div>
    </div>
  </div></footer>

  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore-compat.js"></script>
  <script src="/js/firebase-config.js"></script>
  <script src="/js/app.js"></script>
  <script>
    // Calendar events (loaded from Firestore)
    const typeColors = { assignment: '#4f46e5', quiz: '#d97706', exam: '#dc2626', class: '#0891b2' };

    let currentDate = new Date(2026, 2, 15); // Default to March 2026 for demo data
    let LMS_EVENTS_MAP = {};
    let eventsLoaded = false;

    const childColorsArray = ['#8b5cf6', '#ec4899', '#f59e0b', '#10b981', '#3b82f6'];
    let childColorsMap = {};
    let courseChildMap = {};
    let childNamesMap = {};

    async function loadEvents(enrolledCourseIds) {
      enrolledCourseIds = enrolledCourseIds || [];
      try {
        const snapshot = await db.collection('events').get();
        snapshot.forEach(doc => {
          const e = doc.data();
          // Filter: if user has enrolled courses, only show events for those courses
          if (enrolledCourseIds.length > 0 && e.courseId && !enrolledCourseIds.includes(e.courseId)) return;
          if (!LMS_EVENTS_MAP[e.date]) LMS_EVENTS_MAP[e.date] = [];
          LMS_EVENTS_MAP[e.date].push(e);
        });
        eventsLoaded = true;
        renderCalendar();
        renderEvents();
      } catch(err) {
        console.error("Error loading events", err);
        renderCalendar(); // still render empty calendar on error
      }
    }

    function renderCalendar() {
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();
      const grid = document.getElementById('calendar-grid');

      document.getElementById('calendar-month-year').textContent = new Date(year, month, 1).toLocaleDateString('en-US', { month: 'long', year: 'numeric' });

      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const today = new Date();

      let html = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d => `<div class="calendar-day-name">${d}</div>`).join('');

      for (let i = 0; i < firstDay; i++) {
        html += '<div class="calendar-day" style="opacity:0.3;"></div>';
      }

      for (let day = 1; day <= daysInMonth; day++) {
        const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        const hasEvent = LMS_EVENTS_MAP[dateStr];
        const isToday = today.getFullYear() === year && today.getMonth() === month && today.getDate() === day;
        
        let eventColor = '';
        if (hasEvent) {
          const e = hasEvent[0];
          const user = getCurrentUser();
          if (user && user.role === 'parent' && courseChildMap[e.courseId]) {
            eventColor = childColorsMap[courseChildMap[e.courseId]] || typeColors[e.type];
          } else {
            eventColor = typeColors[e.type] || '';
          }
        }

        html += `<div class="calendar-day ${isToday ? 'today' : ''}" style="position:relative;${hasEvent ? 'font-weight:700;color:' + eventColor : ''}" onclick="showDayEvents('${dateStr}')">
          ${day}
          ${hasEvent ? `<span style="position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:5px;height:5px;border-radius:50%;background:${eventColor};"></span>` : ''}
        </div>`;
      }

      grid.innerHTML = html;
    }

    function renderEvents() {
      const list = document.getElementById('events-list');
      const sortedDates = Object.keys(LMS_EVENTS_MAP).sort();
      const today = new Date().toISOString().split('T')[0];

      const upcoming = sortedDates.filter(d => d >= '2026-03-15');

      list.innerHTML = upcoming.slice(0, 6).map(date => {
        const evts = LMS_EVENTS_MAP[date];
        return evts.map(e => {
          let eventColor = typeColors[e.type];
          let prefix = '';
          const user = getCurrentUser();
          if (user && user.role === 'parent' && courseChildMap[e.courseId]) {
            const cid = courseChildMap[e.courseId];
            eventColor = childColorsMap[cid] || eventColor;
            prefix = `<span style="font-size:0.7rem; background:${eventColor}20; color:${eventColor}; padding:2px 6px; border-radius:4px; margin-right:6px;">${childNamesMap[cid] || 'Child'}</span>`;
          }
          return `
          <div class="event-item" style="border-left-color:${eventColor};">
            <span class="event-date">${new Date(date + 'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'})}</span>
            <span style="flex:1; display:flex; align-items:center;">${prefix}${e.title}</span>
            <span style="font-size:0.75rem;color:var(--text-muted);">${e.time}</span>
          </div>
          `;
        }).join('');
      }).join('');
    }

    function showDayEvents(dateStr) {
      const evts = LMS_EVENTS_MAP[dateStr];
      if (evts) {
        const day = new Date(dateStr + 'T12:00:00').toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
        showToast(`${day}: ${evts.map(e => e.title).join(', ')}`, 'info', 4000);
      }
    }

    document.addEventListener('DOMContentLoaded', async () => {
      // Wait for Firebase Auth to restore session before checking access
      const user = await waitForAuth();
      if (!user) {
        window.location.href = '/pages/public/login.html';
        return;
      }
      const uid = user.uid;

      async function loadEnrolledCourses() {
        if (!uid || !window.db) return [];
        try {
          if (user.role === 'parent') {
            const pDoc = await db.collection('users').doc(uid).get();
            const childIds = pDoc.data()?.linkedStudents || [];
            if (childIds.length === 0) return [];

            let allCourseIds = [];
            for (let i = 0; i < childIds.length; i++) {
              const cid = childIds[i];
              childColorsMap[cid] = childColorsArray[i % childColorsArray.length];
              
              const cDoc = await db.collection('users').doc(cid).get();
              if (cDoc.exists) childNamesMap[cid] = cDoc.data().name.split(' ')[0];

              const cSnap = await db.collection('courses').where('students', 'array-contains', cid).get();
              cSnap.forEach(doc => {
                 allCourseIds.push(doc.id);
                 if(!courseChildMap[doc.id]) courseChildMap[doc.id] = cid;
              });
            }
            
            // Build Parent Legend
            const legendContainer = document.getElementById('legend-container');
            const legendTitle = document.getElementById('legend-title');
            if (legendContainer && Object.keys(childNamesMap).length > 0) {
              legendTitle.textContent = "Children";
              let legendHtml = '';
              Object.entries(childNamesMap).forEach(([id, name]) => {
                 const col = childColorsMap[id];
                 legendHtml += `<div style="display:flex;align-items:center;gap:var(--space-sm);font-size:0.85rem;"><span style="width:12px;height:12px;border-radius:3px;background:${col};"></span> ${name}'s Events</div>`;
              });
              legendContainer.innerHTML = legendHtml;
            }
            return allCourseIds;
          } else {
            const snapshot = await db.collection('courses').where('students', 'array-contains', uid).get();
            return snapshot.docs.map(d => d.id);
          }
        } catch(e) { return []; }
      }

      async function init() {
        const enrolledCourseIds = await loadEnrolledCourses();
        await loadEvents(enrolledCourseIds);
      }

      init();

      document.getElementById('prev-month').addEventListener('click', () => {
        currentDate = new Date(currentDate.getFullYear(), currentDate.getMonth() - 1, 1);
        renderCalendar();
      });
      document.getElementById('next-month').addEventListener('click', () => {
        currentDate = new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 1);
        renderCalendar();
      });
    });
  </script>
</body>
</html>
