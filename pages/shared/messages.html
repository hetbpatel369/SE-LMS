<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Messages – LMS</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body>
  <div id="app-header"></div>

  <main class="page-wrapper has-course-nav">
    <div class="container">
      <div class="chat-layout animate-up">
        <div class="chat-contacts" id="contacts-panel">
          <div class="chat-contact-search">
            <input type="text" class="form-input" id="contact-search" placeholder="Search contacts...">
          </div>
          <div id="contacts-list"></div>
        </div>

        <div class="chat-main">
          <div style="padding:var(--space-md);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:var(--space-sm);">
            <div class="avatar" id="chat-avatar" style="font-size:0.75rem;">DS</div>
            <div>
              <h4 style="font-size:0.9rem;" id="chat-name">Dr. Smith</h4>
              <span style="font-size:0.75rem;color:var(--text-muted);" id="chat-status">Professor – Mathematics 101</span>
            </div>
          </div>

          <div class="chat-messages" id="chat-messages">
            <!-- Populated by JS -->
          </div>

          <div class="chat-input-area">
            <input type="text" class="form-input" id="message-input" placeholder="Type a message..." style="flex:1;">
            <button class="btn btn-primary" id="send-btn" style="padding:12px 20px;">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore-compat.js"></script>
  <script src="/js/firebase-config.js"></script>
  <script src="/js/app.js"></script>
  <script>
    let currentUser = null;
    let LMS_CONTACTS = [];
    let LMS_MESSAGES = {};
    let currentContact = null;

    document.addEventListener('DOMContentLoaded', async () => {
      // Wait for Firebase Auth to restore session before proceeding
      const authUser = await waitForAuth();
      if (!authUser) {
        window.location.href = '/pages/public/login.html';
        return;
      }
      // Set currentUser from the Firebase auth object for message queries
      currentUser = auth.currentUser;
      loadContacts();

      document.getElementById('send-btn').addEventListener('click', sendMessage);
      document.getElementById('message-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
      });
      document.getElementById('contact-search').addEventListener('input', renderContacts);
    });

    async function loadContacts() {
      try {
        const currentUserData = getCurrentUser() || currentUser;
        const myUid = currentUserData.uid || currentUser.uid;
        
        const uSnap = await db.collection('users').doc(myUid).get();
        const me = uSnap.data() || {};
        const myRole = me.role;

        let allowedMap = new Set();
        
        const allUsersSnap = await db.collection('users').get();
        const allUsers = [];
        allUsersSnap.forEach(d => allUsers.push({ id: d.id, ...d.data() }));

        allUsers.forEach(u => {
           if (u.role === 'admin') allowedMap.add(u.id);
        });

        if (myRole === 'parent') {
           const children = me.linkedStudents || [];
           children.forEach(c => allowedMap.add(c));
           
           for (const cid of children) {
              const cSnap = await db.collection('courses').where('students', 'array-contains', cid).get();
              cSnap.forEach(cDoc => {
                  if (cDoc.data().instructorId) allowedMap.add(cDoc.data().instructorId);
              });
           }
        } 
        else if (myRole === 'student') {
           if (me.parentId) allowedMap.add(me.parentId);
           
           const cSnap = await db.collection('courses').where('students', 'array-contains', myUid).get();
           cSnap.forEach(cDoc => {
               if (cDoc.data().instructorId) allowedMap.add(cDoc.data().instructorId);
           });
        }
        else if (myRole === 'professor') {
           const tSnap = await db.collection('courses').where('instructorId', '==', myUid).get();
           tSnap.forEach(cDoc => {
               const studs = cDoc.data().students || [];
               studs.forEach(s => allowedMap.add(s));
           });
           
           for (const uid of Array.from(allowedMap)) {
               const sDoc = allUsers.find(x => x.id === uid);
               if (sDoc && sDoc.parentId) allowedMap.add(sDoc.parentId);
           }
        }
        else if (myRole === 'admin') {
           allUsers.forEach(u => allowedMap.add(u.id));
        }

        LMS_CONTACTS = [];
        allUsers.forEach(data => {
          if (data.id !== myUid && allowedMap.has(data.id)) {
            LMS_CONTACTS.push({
              id: data.id,
              name: data.name || 'Anonymous',
              role: data.role || 'Member',
              avatar: data.name ? data.name.split(' ').map(n=>n[0]).join('') : 'U',
              online: true 
            });
          }
        });
        
        if (LMS_CONTACTS.length === 0) {
           LMS_CONTACTS.push({
             id: 'support', name: 'Support', role: 'admin', avatar: 'S', online: true
           });
        }
        
        if (LMS_CONTACTS.length > 0 && !currentContact) {
          currentContact = LMS_CONTACTS[0].id;
        }

        renderContacts();
        if (currentContact) {
          selectContact(currentContact);
        }
      } catch (err) {
        console.error("Error loading contacts", err);
      }
    }

    async function loadMessages(contactId) {
      const container = document.getElementById('chat-messages');
      container.innerHTML = '<div style="text-align:center;padding:20px;color:var(--text-muted);">Loading messages...</div>';

      try {
        // Fetch messages where sender = me AND receiver = contact
        const sentSnapshot = await db.collection('messages')
          .where('senderId', '==', currentUser.uid)
          .where('receiverId', '==', contactId)
          .get();
          
        // Fetch messages where sender = contact AND receiver = me
        const recvSnapshot = await db.collection('messages')
          .where('senderId', '==', contactId)
          .where('receiverId', '==', currentUser.uid)
          .get();
        
        const allMsgs = [];
        sentSnapshot.forEach(doc => allMsgs.push(doc.data()));
        recvSnapshot.forEach(doc => allMsgs.push(doc.data()));
        
        // Sort by timestamp if available
        allMsgs.sort((a,b) => {
           const tA = a.timestamp ? a.timestamp.toMillis() : 0;
           const tB = b.timestamp ? b.timestamp.toMillis() : 0;
           return tA - tB;
        });

        if (allMsgs.length === 0) {
          const contact = LMS_CONTACTS.find(c => c.id === contactId);
          allMsgs.push({
            senderId: contactId,
            receiverId: currentUser.uid,
            text: `Hi ${currentUser.name ? currentUser.name.split(' ')[0] : 'there'}, I'm ${contact ? contact.name : 'here'}. How can I help you today?`,
            timeString: "09:00 AM"
          });
        }
        
        LMS_MESSAGES[contactId] = allMsgs;
        renderMessages();
      } catch (err) {
        console.error("Error loading messages", err);
        container.innerHTML = '<div style="text-align:center;padding:20px;color:var(--text-muted);">Failed to load messages.</div>';
      }
    }

    function renderContacts() {
      const list = document.getElementById('contacts-list');
      const search = (document.getElementById('contact-search').value || '').toLowerCase();

      const filtered = LMS_CONTACTS.filter(c => c.name && c.name.toLowerCase().includes(search));

      list.innerHTML = filtered.map(c => `
        <div class="chat-contact-item ${c.id === currentContact ? 'active' : ''}" onclick="selectContact('${c.id}')">
          <div class="avatar" style="font-size:0.75rem;flex-shrink:0;">${c.avatar}</div>
          <div class="chat-contact-info" style="min-width:0;">
            <h4>${c.name}</h4>
            <p style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:0.8rem;color:var(--text-muted);">${c.role}</p>
          </div>
        </div>
      `).join('');
    }

    function selectContact(id) {
      currentContact = id;
      const contact = LMS_CONTACTS.find(c => c.id === id);
      if (contact) {
        document.getElementById('chat-avatar').textContent = contact.avatar || '?';
        document.getElementById('chat-name').textContent = contact.name || 'Unknown';
        document.getElementById('chat-status').textContent = (contact.role || '') + (contact.online ? ' · Online' : ' · Offline');
      }
      renderContacts();
      loadMessages(id);
    }

    function renderMessages() {
      const container = document.getElementById('chat-messages');
      const msgs = LMS_MESSAGES[currentContact] || [];
      if (msgs.length === 0) {
        container.innerHTML = '<div style="text-align:center;padding:20px;color:var(--text-muted);">No messages yet. Say hi!</div>';
        return;
      }
      container.innerHTML = msgs.map(m => {
        const isMe = m.senderId === currentUser.uid;
        return `
        <div class="chat-bubble ${isMe ? 'sent' : 'received'}">
          ${m.text}
          <span class="time">${m.timeString || ''}</span>
        </div>
        `;
      }).join('');
      container.scrollTop = container.scrollHeight;
    }

    async function sendMessage() {
      const input = document.getElementById('message-input');
      const text = input.value.trim();
      if (!text || !currentContact || !currentUser) return;

      const now = new Date();
      const timeString = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
      const msgData = { 
        senderId: currentUser.uid, 
        receiverId: currentContact, 
        text, 
        timeString,
        timestamp: firebase.firestore.FieldValue.serverTimestamp()
      };

      // Optimistic UI Update
      if (!LMS_MESSAGES[currentContact]) LMS_MESSAGES[currentContact] = [];
      LMS_MESSAGES[currentContact].push({ ...msgData, timestamp: null }); 
      
      input.value = '';
      renderMessages();

      // Save to Firestore
      try {
        await db.collection('messages').add(msgData);
      } catch (err) {
        console.error("Error sending message", err);
        showToast('Error sending message', 'error');
      }
    }
  </script>
</body>
</html>
