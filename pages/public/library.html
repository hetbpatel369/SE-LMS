<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Digital Library - Browse and borrow books.">
  <title>Digital Library – LMS</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body>
  <div id="app-header"></div>

  <!-- Navbar -->
  

  <main class="page-wrapper">
    <div class="container">
      <!-- Page Header -->
      <div style="text-align:center; margin-bottom: var(--space-2xl);" class="animate-up">
        <h1 style="font-size: 3.5rem;">Digital <em class="serif-italic" style="color: var(--primary);">Library</em></h1>
        <p style="max-width:500px;margin:var(--space-sm) auto 0; font-size: 1.1rem;">Browse our collection of digital resources, e-books, and reference materials.</p>
      </div>

      <!-- Search & Filter Bar -->
      <div class="card animate-up animate-up-1" style="padding: var(--space-md); margin-bottom: var(--space-xl); display:flex; gap: var(--space-md); flex-wrap: wrap; align-items:center;">
        <div style="flex:1; min-width:200px;">
          <input type="text" class="form-input" id="book-search" placeholder="Search by title, author, or ISBN..." style="padding:10px 16px;">
        </div>
        <select class="form-select" id="book-category" style="width:160px;padding:10px 12px;">
          <option value="all">All Categories</option>
          <option value="Computer Science">Computer Science</option>
          <option value="Software Engineering">Software Engineering</option>
          <option value="Science">Science</option>
          <option value="Mathematics">Mathematics</option>
          <option value="Literature">Literature</option>
        </select>
        <select class="form-select" id="book-sort" style="width:150px;padding:10px 12px;">
          <option value="newest">Newest Additions</option>
          <option value="rating-high">Highest Rated</option>
          <option value="price-low">Price: Low–High</option>
          <option value="price-high">Price: High–Low</option>
        </select>
      </div>

      <!-- Book Grid -->
      <div class="grid-3" id="books-grid" style="margin-bottom:var(--space-xl);">
        <div style="grid-column:1/-1;text-align:center;padding:var(--space-3xl);color:var(--text-muted);">
          Loading library catalog...
        </div>
      </div>

    </div>
  </main>

  <footer class="footer"><div class="container">
    <div class="footer-bottom" style="padding-top:0;border-top:none;">
      <span>&copy; 2026 LMS. All rights reserved.</span>
      <div><a href="/pages/public/contact.html" style="color:var(--text-on-footer);">Contact</a> &middot; <a href="/pages/public/about.html" style="color:var(--text-on-footer);">About</a> &middot; <a href="/pages/public/privacy.html" style="color:var(--text-on-footer);">Privacy</a></div>
    </div>
  </div></footer>

  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore-compat.js"></script>
  <script src="/js/firebase-config.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/library.js"></script>
</body>
</html>
