<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Log in or create an account on the LMS platform.">
  <title>Login – LMS</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="app-header"></div>

  <!-- Main Content -->
  <main class="page-wrapper">
    <div class="container" style="max-width: 480px;">
      <div class="card" style="padding: var(--space-xl);">
        <!-- Auth Tabs -->
        <div class="tabs" style="justify-content: center;">
          <button class="tab-btn active" id="login-tab">Log In</button>
          <button class="tab-btn" id="register-tab">Register</button>
        </div>

        <!-- Login Form -->
        <form id="login-form" class="tab-content active">
          <div class="form-group">
            <label class="form-label" for="login-email">Email</label>
            <input type="email" class="form-input" id="login-email" placeholder="you@example.com" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="login-password">Password</label>
            <input type="password" class="form-input" id="login-password" placeholder="Enter your password" required>
          </div>
          <div style="text-align:right; margin-bottom: var(--space-md);">
            <a href="#" id="forgot-password" style="font-size: 0.85rem;">Forgot password?</a>
          </div>
          <button type="submit" class="btn btn-primary" style="width:100%;">Log In</button>
        </form>

        <!-- Register Form -->
        <form id="register-form" class="tab-content">
          <div class="form-group">
            <label class="form-label" for="register-name">Full Name</label>
            <input type="text" class="form-input" id="register-name" placeholder="Your full name" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="register-email">Email</label>
            <input type="email" class="form-input" id="register-email" placeholder="you@example.com" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="register-password">Password</label>
            <input type="password" class="form-input" id="register-password" placeholder="At least 6 characters" required minlength="6">
          </div>
          <div class="form-group">
            <label class="form-label">I am a:</label>
            <div style="display:flex; gap: var(--space-md); margin-top: var(--space-xs);">
              <label style="display:flex; align-items:center; gap:6px; cursor:pointer; font-size:0.9rem;">
                <input type="radio" name="register-role" value="student" checked> Student
              </label>
              <label style="display:flex; align-items:center; gap:6px; cursor:pointer; font-size:0.9rem;">
                <input type="radio" name="register-role" value="parent"> Parent
              </label>
            </div>
          </div>
          <button type="submit" class="btn btn-primary" style="width:100%;">Sign Up</button>
          <p style="text-align:center; font-size:0.8rem; margin-top: var(--space-md); color: var(--text-muted);">
            Registration requires admin approval before access is granted.
          </p>
        </form>
      </div>
    </div>
  </main>

  <!-- Forgot Password Modal -->
  <div class="modal-overlay" id="forgot-modal">
    <div class="modal">
      <div class="modal-header">
        <h3>Reset Password</h3>
        <button class="modal-close" onclick="closeModal('forgot-modal')">&times;</button>
      </div>
      <p style="margin-bottom: var(--space-lg); font-size:0.9rem;">Enter your email address and we'll send you a password reset link.</p>
      <form id="forgot-form">
        <div class="form-group">
          <label class="form-label" for="forgot-email">Email</label>
          <input type="email" class="form-input" id="forgot-email" placeholder="you@example.com" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;">Send Reset Link</button>
      </form>
    </div>
  </div>

  <footer class="footer"><div class="container">
    <div class="footer-bottom" style="padding-top:0; border-top:none;">
      <span>&copy; 2026 LMS. All rights reserved.</span>
      <div><a href="/pages/public/contact.html" style="color:var(--text-on-footer);">Contact</a> &middot; <a href="/pages/public/about.html" style="color:var(--text-on-footer);">About</a> &middot; <a href="/pages/public/privacy.html" style="color:var(--text-on-footer);">Privacy</a></div>
    </div>
  </div></footer>

  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore-compat.js"></script>
  <script src="/js/firebase-config.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
