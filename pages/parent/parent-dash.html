<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parent Dashboard – LMS</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body>
  <div id="app-header"></div>

  
  <!-- Secondary Course Navbar -->
  
  <div class="dashboard-layout-algoma">
    

    <main class="dashboard-main">
      <div class="dash-header animate-up" id="section-overview">
        <div><h1>Parent Dashboard</h1><p class="dash-date" id="parent-date"></p></div>
      </div>

      <!-- Student List -->
      <div class="dash-section animate-up animate-up-1" id="section-students">
        <div class="dash-section-header">
          <h3>My Children</h3>
        </div>
        <div class="grid-2" id="student-cards" style="align-items:start;">
          <!-- Populated by JS -->
        </div>
      </div>

      <!-- Billing History -->
      <div class="dash-section animate-up animate-up-2" id="section-billing">
        <div class="dash-section-header">
          <h3>Billing History</h3>
          <button class="btn btn-sm btn-secondary" onclick="showToast('Invoices generating feature coming soon', 'info')">View Invoices</button>
        </div>
        <div class="table-wrapper">
          <table>
            <thead><tr><th>Student</th><th>Course</th><th>Amount</th><th>Date</th><th>Status</th><th>Action</th></tr></thead>
            <tbody id="billing-table"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore-compat.js"></script>
  <script src="/js/firebase-config.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/parent.js"></script>
</body>
</html>
