  <main class="page-wrapper">
    <div class="container">
      <div style="text-align:center;margin-bottom:var(--space-2xl);" class="animate-up">
        <h1 style="font-size: 3.5rem;">Academic <em class="serif-italic" style="color:var(--primary);">Calendar</em></h1>
        <p style="font-size: 1.1rem; color: var(--text-secondary); margin-top: var(--space-sm);">Track due dates, quizzes, exams, and live class schedules.</p>
      </div>

      <div class="grid-2 animate-up animate-up-1" style="align-items:start; gap:var(--space-xl);">
        <!-- Calendar Widget -->
        <div class="card" style="padding:var(--space-xl);">
          <div class="calendar-header">
            <button class="btn btn-icon btn-secondary" id="prev-month" aria-label="Previous month">&larr;</button>
            <h3 id="calendar-month-year" style="font-size:1.4rem; font-family:'Cormorant Garamond',serif;">March 2026</h3>
            <button class="btn btn-icon btn-secondary" id="next-month" aria-label="Next month">&rarr;</button>
          </div>
          <div class="calendar-grid" id="calendar-grid">
            <!-- Generated by JS -->
          </div>
        </div>

        <!-- Events Panel -->
        <div class="animate-up animate-up-2">
          <div class="card" style="padding:var(--space-xl);margin-bottom:var(--space-md);">
            <h3 style="margin-bottom:var(--space-md);">Upcoming Events</h3>
            <div class="event-list" id="events-list">
              <!-- Populated by JS -->
            </div>
          </div>
          <div class="card" style="padding:var(--space-xl);">
            <h3 style="margin-bottom:var(--space-md);">Legend</h3>
            <div style="display:flex;flex-direction:column;gap:var(--space-sm);">
              <div style="display:flex;align-items:center;gap:var(--space-sm);font-size:0.85rem;">
                <span style="width:12px;height:12px;border-radius:3px;background:#4f46e5;"></span> Assignment Due
              </div>
              <div style="display:flex;align-items:center;gap:var(--space-sm);font-size:0.85rem;">
                <span style="width:12px;height:12px;border-radius:3px;background:#d97706;"></span> Quiz
              </div>
              <div style="display:flex;align-items:center;gap:var(--space-sm);font-size:0.85rem;">
                <span style="width:12px;height:12px;border-radius:3px;background:#dc2626;"></span> Exam
              </div>
              <div style="display:flex;align-items:center;gap:var(--space-sm);font-size:0.85rem;">
                <span style="width:12px;height:12px;border-radius:3px;background:#0891b2;"></span> Live Class
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

    </div>
  </div></footer>

  <script src="js/app.js"></script>
  <script>
    // Calendar events (keyed by YYYY-MM-DD)
    const EVENTS = {
      '2026-03-18': [{ title: 'Math Assignment Due', type: 'assignment', time: '11:59 PM' }],
      '2026-03-20': [{ title: 'Biology Quiz', type: 'quiz', time: '9:00 AM' }],
      '2026-03-22': [{ title: 'English Essay Submission', type: 'assignment', time: '11:59 PM' }],
      '2026-03-25': [{ title: 'CS Live Class – Zoom', type: 'class', time: '11:00 AM' }],
      '2026-03-28': [{ title: 'Physics Midterm Exam', type: 'exam', time: '10:00 AM' }],
      '2026-04-02': [{ title: 'History Report Due', type: 'assignment', time: '5:00 PM' }],
      '2026-04-05': [{ title: 'Math Quiz', type: 'quiz', time: '10:00 AM' }],
      '2026-04-10': [{ title: 'Science Fair Deadline', type: 'assignment', time: '12:00 PM' }],
    };

    const typeColors = { assignment: '#4f46e5', quiz: '#d97706', exam: '#dc2626', class: '#0891b2' };

    let currentDate = new Date(2026, 2, 15); // March 2026

    function renderCalendar() {
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();
      const grid = document.getElementById('calendar-grid');

      document.getElementById('calendar-month-year').textContent = new Date(year, month, 1).toLocaleDateString('en-US', { month: 'long', year: 'numeric' });

      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const today = new Date();

      let html = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d => `<div class="calendar-day-name">${d}</div>`).join('');

      for (let i = 0; i < firstDay; i++) {
        html += '<div class="calendar-day" style="opacity:0.3;"></div>';
      }

      for (let day = 1; day <= daysInMonth; day++) {
        const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        const hasEvent = EVENTS[dateStr];
        const isToday = today.getFullYear() === year && today.getMonth() === month && today.getDate() === day;
        const eventColor = hasEvent ? typeColors[hasEvent[0].type] : '';

        html += `<div class="calendar-day ${isToday ? 'today' : ''}" style="position:relative;${hasEvent ? 'font-weight:700;color:' + eventColor : ''}" onclick="showDayEvents('${dateStr}')">
          ${day}
          ${hasEvent ? `<span style="position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:5px;height:5px;border-radius:50%;background:${eventColor};"></span>` : ''}
        </div>`;
      }

      grid.innerHTML = html;
    }

    function renderEvents() {
      const list = document.getElementById('events-list');
      const sortedDates = Object.keys(EVENTS).sort();
      const today = new Date().toISOString().split('T')[0];

      const upcoming = sortedDates.filter(d => d >= '2026-03-15');

      list.innerHTML = upcoming.slice(0, 6).map(date => {
        const evts = EVENTS[date];
        return evts.map(e => `
          <div class="event-item" style="border-left-color:${typeColors[e.type]};">
            <span class="event-date">${new Date(date + 'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'})}</span>
            <span style="flex:1;">${e.title}</span>
            <span style="font-size:0.75rem;color:var(--text-muted);">${e.time}</span>
          </div>
        `).join('');
      }).join('');
    }

    function showDayEvents(dateStr) {
      const evts = EVENTS[dateStr];
      if (evts) {
        const day = new Date(dateStr + 'T12:00:00').toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
        showToast(`${day}: ${evts.map(e => e.title).join(', ')}`, 'info', 4000);
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      // Access Control
      if (!requireAuth()) return;

      renderCalendar();
      renderEvents();
      document.getElementById('prev-month').addEventListener('click', () => {
        currentDate.setMonth(currentDate.getMonth() - 1);
        renderCalendar();
      });
      document.getElementById('next-month').addEventListener('click', () => {
        currentDate.setMonth(currentDate.getMonth() + 1);
        renderCalendar();
      });
    });
  </script>
</body>
