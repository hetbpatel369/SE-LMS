<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Dashboard – LMS</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar"><div class="container flex-between">
    <a href="index.html" class="nav-logo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg> LMS</a>
    <div class="nav-actions">
      <button class="theme-toggle" aria-label="Toggle theme"><svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg><svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg></button>
      <button id="sidebar-toggle" class="btn btn-icon btn-secondary" style="display:none;" aria-label="Toggle sidebar">☰</button>
      <button onclick="logout()" class="btn btn-sm btn-outline" style="border-color:#ef4444;color:#ef4444;">Logout</button>
    </div>
  </div></nav>
  <!-- Secondary Course Navbar -->
  <div class="course-navbar animate-up">
    <div class="container">
      <nav class="course-nav-links">
        <a href="#" class="active" data-section="overview">Overview</a>
        <a href="#" data-section="courses">My Courses</a>
        <a href="calendar.html" data-section="calendar">Calendar</a>
        <a href="my-library.html" data-section="library">Library</a>
        <a href="messages.html" data-section="messages">Messages</a>
        <a href="#" data-section="grades">Grades</a>
        <a href="profile.html" data-section="profile">Profile</a>
      </nav>
    </div>
  </div>

  <div class="dashboard-layout-algoma">
    <!-- Sidebar -->
    <!-- Main Content -->
    <main class="dashboard-main">
      <!-- Overview Section -->
      <div id="section-overview">
        <div class="dash-header animate-up">
          <div>
            <h1 id="welcome-msg">Welcome back, John!</h1>
            <p class="dash-date" id="current-date"></p>
          </div>
        </div>

        <!-- Stats -->
        <div class="stats-row animate-up animate-up-1">
          <div class="stat-card">
            <div class="stat-icon purple"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg></div>
            <div class="stat-info"><h4 id="stat-enrolled">4</h4><div class="stat-label">Enrolled Courses</div></div>
          </div>
          <div class="stat-card has-dropdown">
            <div class="stat-icon green"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></div>
            <div class="stat-info"><h4 id="stat-completed">1</h4><div class="stat-label">Completed</div></div>
            <div class="stat-dropdown">
              <div class="stat-dropdown-title">Completed Courses</div>
              <div class="stat-dropdown-item">
                <div style="flex:1;">
                  <span style="display:block; font-weight: 500; font-family: 'Lexend', sans-serif;">Introduction to Psychology</span>
                  <span style="font-size: 0.75rem; color: var(--text-muted);">Grade: A</span>
                </div>
              </div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon blue"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
            <div class="stat-info"><h4 id="stat-pending">3</h4><div class="stat-label">Pending Assignments</div></div>
          </div>
          <div class="stat-card">
            <div class="stat-icon orange"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></div>
            <div class="stat-info"><h4 id="stat-gpa">3.5</h4><div class="stat-label">GPA</div></div>
          </div>
        </div>

        <!-- My Courses & Upcoming Events -->
        <div class="dashboard-grid-algoma animate-up animate-up-2" id="section-courses">
          <div class="dash-section">
            <div class="dash-section-header">
              <h3>My Courses</h3>
              <a href="#" id="view-all-courses-btn" class="btn btn-sm btn-secondary">View All</a>
            </div>
            <div style="display:flex; flex-direction:column; gap:var(--space-sm);" id="my-courses-list">
              <!-- Populated by JS -->
            </div>
          </div>

          <div class="dash-section">
            <div class="dash-section-header"><h3>Upcoming Events</h3></div>
            <div class="event-list" id="upcoming-events">
              <!-- Populated by JS -->
            </div>
          </div>
        </div>

        <!-- Recent Grades -->
        <div class="dash-section animate-up animate-up-3" id="section-grades">
          <div class="dash-section-header"><h3>Recent Grades</h3></div>
          <div class="table-wrapper">
            <table>
              <thead><tr><th>Course</th><th>Assignment</th><th>Score</th><th>Grade</th><th>Date</th></tr></thead>
              <tbody id="grades-table">
                <!-- Populated by JS -->
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/app.js"></script>
  <script src="js/demo-data.js"></script>
  <script src="js/student.js"></script>
</body>
</html>
