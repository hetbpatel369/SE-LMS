<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Profile – LMS</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav class="navbar"><div class="container flex-between">
    <a href="index.html" class="nav-logo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg> LMS</a>
    <div class="nav-links"><a href="index.html">Home</a><a href="about.html">About</a><a href="contact.html">Contact</a></div>
    <div class="nav-actions">
      <button class="theme-toggle" aria-label="Toggle theme"><svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg><svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg></button>
      <div id="nav-auth"><a href="login.html" class="btn btn-sm btn-secondary">Log In</a><a href="login.html" class="btn btn-sm btn-primary">Sign Up</a></div>
      <button class="nav-toggle" aria-label="Toggle menu"><span></span><span></span><span></span></button>
    </div>
  </div></nav>

  <main class="page-wrapper animate-up">
    <div class="container" style="max-width: 600px;">
      <h1 class="font-serif italic" style="margin-bottom: var(--space-xl); text-align: center;">My <span style="color:var(--primary)">Profile</span></h1>
      
      <div class="card" style="padding: var(--space-xl);">
        <div style="display:flex; align-items:center; gap:var(--space-md); margin-bottom: var(--space-lg); border-bottom: 1px solid var(--border); padding-bottom: var(--space-lg);">
          <div class="avatar" style="font-size:1.5rem; width:80px; height:80px;" id="profile-avatar">U</div>
          <div>
            <h2 id="profile-name">User Name</h2>
            <p style="color:var(--text-muted);" id="profile-role">User Role</p>
          </div>
        </div>

        <form onsubmit="event.preventDefault(); showToast('Profile updated (Demo)', 'success');">
          <div class="form-group">
            <label class="form-label">Full Name</label>
            <input type="text" class="form-input" id="input-name" required>
          </div>
          <div class="form-group">
            <label class="form-label">Email Address</label>
            <input type="email" class="form-input" id="input-email" required>
          </div>
          <div class="form-group">
            <label class="form-label">Student ID (Optional)</label>
            <input type="text" class="form-input" placeholder="e.g. 100456789">
          </div>
          <button type="submit" class="btn btn-primary" style="margin-top: var(--space-md);">Save Changes</button>
        </form>
      </div>
    </div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (!requireAuth()) return;
      const user = getCurrentUser();
      
      document.getElementById('profile-name').textContent = user.name;
      document.getElementById('profile-role').textContent = user.role.charAt(0).toUpperCase() + user.role.slice(1);
      document.getElementById('profile-avatar').textContent = user.name.charAt(0).toUpperCase();
      
      document.getElementById('input-name').value = user.name;
      document.getElementById('input-email').value = user.email || '';
    });
  </script>
</body>
</html>
