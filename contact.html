<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Contact the LMS support team. Send us a message or reach out via email or phone.">
  <title>Contact Us – LMS</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar"><div class="container flex-between">
    <a href="index.html" class="nav-logo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg> LMS</a>
    <div class="nav-links"><a href="index.html">Home</a><a href="about.html">About</a><a href="contact.html">Contact</a></div>
    <div class="nav-actions">
      <button class="theme-toggle" aria-label="Toggle theme"><svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg><svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg></button>
      <div id="nav-auth"><a href="login.html" class="btn btn-sm btn-secondary">Log In</a><a href="login.html" class="btn btn-sm btn-primary">Sign Up</a></div>
      <button class="nav-toggle" aria-label="Toggle menu"><span></span><span></span><span></span></button>
    </div>
  </div></nav>

  <!-- Main Content -->
  <main class="page-wrapper">
    <div class="container" style="max-width: 900px;">
      <div style="text-align:center; margin-bottom: var(--space-3xl);" class="animate-up">
        <span class="badge badge-primary" style="margin-bottom: var(--space-md); display:inline-flex; letter-spacing:0.1em;">SUPPORT</span>
        <h1 style="font-size: 3.5rem;">Contact <em class="serif-italic" style="color: var(--primary);">Us</em></h1>
      </div>

      <div class="grid-2 animate-up animate-up-1" style="gap: var(--space-xl); align-items: start;">
        <!-- Contact Form -->
        <div class="card" style="padding: var(--space-xl);">
          <h3 style="margin-bottom: var(--space-lg);">Send us a Message</h3>
          <form id="contact-form">
            <div class="form-group">
              <label class="form-label" for="contact-name">Name</label>
              <input type="text" class="form-input" id="contact-name" placeholder="Your full name" required>
            </div>
            <div class="form-group">
              <label class="form-label" for="contact-email">Email</label>
              <input type="email" class="form-input" id="contact-email" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
              <label class="form-label" for="contact-message">Message</label>
              <textarea class="form-textarea" id="contact-message" placeholder="How can we help you?" required></textarea>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;" id="contact-submit">Send Message</button>
          </form>
        </div>

        <!-- Contact Info -->
        <div>
          <div class="card" style="padding: var(--space-xl); margin-bottom: var(--space-md);">
            <h3 style="margin-bottom: var(--space-lg);">Contact Information</h3>
            <div style="display:flex; flex-direction:column; gap: var(--space-lg);">
              <div style="display:flex; align-items:flex-start; gap: var(--space-md);">
                <div style="width:44px;height:44px;border-radius:var(--radius-md);background:rgba(79,70,229,0.1);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                </div>
                <div>
                  <h4 style="font-size:0.9rem;">Email</h4>
                  <a href="mailto:support@lms.edu" style="font-size:0.9rem;">support@lms.edu</a>
                </div>
              </div>
              <div style="display:flex; align-items:flex-start; gap: var(--space-md);">
                <div style="width:44px;height:44px;border-radius:var(--radius-md);background:rgba(6,182,212,0.1);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
                </div>
                <div>
                  <h4 style="font-size:0.9rem;">Phone</h4>
                  <a href="tel:+11234567890" style="font-size:0.9rem;">+1 (123) 456-7890</a>
                </div>
              </div>
              <div style="display:flex; align-items:flex-start; gap: var(--space-md);">
                <div style="width:44px;height:44px;border-radius:var(--radius-md);background:rgba(34,197,94,0.1);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                </div>
                <div>
                  <h4 style="font-size:0.9rem;">Address</h4>
                  <p style="font-size:0.9rem;">123 Education Street, Toronto, Canada</p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer"><div class="container">
    <div class="footer-bottom" style="padding-top:0; border-top:none;">
      <span>&copy; 2026 LMS. All rights reserved.</span>
      <div><a href="contact.html" style="color:var(--text-on-footer);">Contact</a> &middot; <a href="about.html" style="color:var(--text-on-footer);">About</a> &middot; <a href="privacy.html" style="color:var(--text-on-footer);">Privacy</a></div>
    </div>
  </div></footer>

  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.getElementById('contact-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const name = document.getElementById('contact-name').value.trim();
      const email = document.getElementById('contact-email').value.trim();
      const msg = document.getElementById('contact-message').value.trim();

      if (!name || !email || !msg) {
        showToast('Please fill in all fields.', 'error');
        return;
      }
      if (!validateEmail(email)) {
        showToast('Please enter a valid email address.', 'error');
        return;
      }

      // In production, this would send to Firebase or an API
      showToast('Message sent successfully! We\'ll get back to you soon.', 'success');
      this.reset();
    });
  </script>
</body>
</html>
