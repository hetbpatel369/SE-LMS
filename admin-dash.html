<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard – LMS</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar"><div class="container flex-between">
    <a href="index.html" class="nav-logo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg> LMS</a>
    <div class="nav-actions">
      <button class="theme-toggle" aria-label="Toggle theme"><svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg><svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg></button>
      <button id="sidebar-toggle" class="btn btn-icon btn-secondary" style="display:none;">☰</button>
      <button onclick="logout()" class="btn btn-sm btn-outline" style="border-color:#ef4444;color:#ef4444;">Logout</button>
    </div>
  </div></nav>
  <!-- Secondary Course Navbar -->
  <div class="course-navbar animate-up">
    <div class="container">
      <nav class="course-nav-links">
        <a href="#" class="active" data-section="overview">Overview</a>
        <a href="#" data-section="approvals">Approvals</a>
        <a href="#" data-section="users">Users</a>
        <a href="#" data-section="revenue">Revenue</a>
        <a href="#" data-section="settings">Settings</a>
      </nav>
    </div>
  </div>
  <div class="dashboard-layout-algoma">
    

    <main class="dashboard-main">
      <!-- Overview -->
      <div id="section-overview">
        <div class="dash-header animate-up">
          <div><h1>Admin Dashboard</h1><p class="dash-date" id="admin-date"></p></div>
        </div>

        <div class="stats-row animate-up animate-up-1">
          <div class="stat-card"><div class="stat-icon purple"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg></div><div class="stat-info"><h4 id="stat-total-users">256</h4><div class="stat-label">Total Users</div></div></div>
          <div class="stat-card"><div class="stat-icon green"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg></div><div class="stat-info"><h4 id="stat-total-courses">22</h4><div class="stat-label">Active Courses</div></div></div>
          <div class="stat-card"><div class="stat-icon blue"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></div><div class="stat-info"><h4 id="stat-revenue">$12,450</h4><div class="stat-label">Total Revenue</div></div></div>
          <div class="stat-card"><div class="stat-icon orange"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div><div class="stat-info"><h4 id="stat-pending-approvals">5</h4><div class="stat-label">Pending Approvals</div></div></div>
        </div>

        <div class="grid-2 animate-up animate-up-2" style="align-items:start;">
          <!-- Pending Approvals -->
          <div class="dash-section" id="section-approvals">
            <div class="dash-section-header"><h3>Pending User Approvals</h3></div>
            <div class="card" style="padding:0;">
              <div class="table-wrapper" style="border:none;">
                <table>
                  <thead><tr><th>Name</th><th>Role</th><th>Email</th><th>Action</th></tr></thead>
                  <tbody id="approvals-table"></tbody>
                </table>
              </div>
            </div>
          </div>

          <!-- Recent Activity -->
          <div class="dash-section">
            <div class="dash-section-header"><h3>Recent Activity</h3></div>
            <div class="card">
              <div class="activity-list" id="admin-activity"></div>
            </div>
          </div>
        </div>

        <!-- All Users -->
        <div class="dash-section animate-up animate-up-3" id="section-users">
          <div class="dash-section-header">
            <h3>All Users</h3>
            <div style="display:flex;gap:var(--space-sm);">
              <input type="text" class="form-input" id="user-search" placeholder="Search users..." style="width:220px;padding:8px 12px;">
              <select class="form-select" id="user-filter" style="width:140px;padding:8px 12px;">
                <option value="all">All Roles</option>
                <option value="student">Students</option>
                <option value="professor">Professors</option>
                <option value="parent">Parents</option>
              </select>
            </div>
          </div>
          <div class="table-wrapper">
            <table>
              <thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Status</th><th>Joined</th></tr></thead>
              <tbody id="users-table"></tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="js/app.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
